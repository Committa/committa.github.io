{{- $action := .Site.Params.formspree_action -}}
<section class="section section--contact" data-reveal>
  <div class="container contact-grid">
    <div class="contact-info">
      <h2>Contatti</h2>
      <p class="contact-info__lead">Scrivimi per una valutazione gratuita del tuo caso d'uso o del tuo progetto. Ti rispondo entro 24 ore lavorative.</p>
      <dl class="contact-info__list">
        <dt>Email</dt>
        <dd><a href="mailto:info@committa.it">info@committa.it</a></dd>
        <dt>Area</dt>
        <dd>Italia</dd>
        {{- with .Site.Params.linkedin_site -}}
        <dt>LinkedIn</dt>
        <dd><a href="{{ . }}" rel="noopener">Marco Baccarani</a></dd>
        {{- end -}}
      </dl>
    </div>
    <form class="contact-form" method="POST" action="{{ $action | default "/contatti/" }}"{{ if $action }} data-formspree{{ end }}>
      <div class="field">
        <label for="cf-name">Nome <span aria-hidden="true">*</span></label>
        <input type="text" id="cf-name" name="name" autocomplete="name" required>
        <p class="field__error" data-error-for="cf-name"></p>
      </div>
      <div class="field">
        <label for="cf-email">Email aziendale <span aria-hidden="true">*</span></label>
        <input type="email" id="cf-email" name="email" autocomplete="email" required>
        <p class="field__error" data-error-for="cf-email"></p>
      </div>
      <div class="field">
        <label for="cf-reason">Motivo del contatto</label>
        <select id="cf-reason" name="reason">
          <option value="servizi">Servizi</option>
          <option value="lira">LIRA</option>
          <option value="altro">Altro</option>
        </select>
      </div>
      <div class="field">
        <label for="cf-msg">Messaggio <span aria-hidden="true">*</span></label>
        <textarea id="cf-msg" name="message" rows="5" required></textarea>
        <p class="field__error" data-error-for="cf-msg"></p>
      </div>
      <button type="submit" class="btn btn--primary btn--block">Invia messaggio</button>
      <p class="contact-form__status" data-form-status role="status" aria-live="polite"></p>
    </form>
  </div>
</section>
