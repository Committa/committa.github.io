- title: "Total data sovereignty"
  icon: shield
  description: "LIRA is 100% on-premise by design. No data traveling to external services, no third-party API keys, no 'trust us' promises."
  list:
    - "Pipeline, models, vector store, LLM — everything runs within your perimeter"
    - "GDPR-compliant, auditable, ready for even the most restrictive security policies"
    - "Hybrid deployment (part on-prem, part cloud) or 100% cloud when needed — without redesigning"
- title: "Truly scalable"
  icon: scale
  description: "Containerized, modular architecture — starts from a single machine and scales to clusters on distributed infrastructure."
  list:
    - "10,000 pages of documentation or 10 million? The same platform, sized accordingly"
    - "Embedding, reranking, LLM serving, retrieval — each component scales independently"
- title: "Tailored to you"
  icon: settings
  description: "The platform molds itself to you, not the other way around. Every parameter is configurable and tuned to your context."
  list:
    - "Domain-appropriate embedding model (directional, technical, multilingual)"
    - "LLM chosen based on the quality/cost/latency trade-off you need"
    - "Chunking tuned to document type (contracts vs manuals vs reports)"
    - "Retrieval and reranking thresholds optimized on your actual data"
    - "Connectors for filesystem and SMB shares; SharePoint, Documentum, ERP on request"
    - "Prompts and UI branded as core to your brand"
- title: "Multimodal and verifiable"
  icon: image
  description: "Indexes text, tables and images. Every answer — every single answer — cites the source passage."
  list:
    - "Text, tables, images, diagrams and plant schematics — everything enters the knowledge base"
    - "Images receive automatically generated captions from vision models"
    - "Full source transparency: every answer cites the source passage, document and page"
