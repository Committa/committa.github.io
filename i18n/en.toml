other = "GDPR-ready"

[lira_trust_no_third_party]
other = "No third-party data"

[lira_made_for_you_title]
other = "Built on your documents. Not on the internet."

[lira_made_for_you_lead]
other = "Generic AIs are powerful but have a structural limitation: <em>they don't know your company</em>. They don't know what's in your contracts, your technical manuals, the protocols you've been using for twenty years. So they generalize. They make up answers. You need facts, not fantasy."

[lira_made_for_you_body]
other = "LIRA is not a pre-packaged platform to adapt to you. <strong>It's the opposite</strong>: the platform molds itself to you. The results are <em>qualitatively superior</em> to any out-of-the-box solution, for a simple reason: <strong>they start from the internet, we start from your documents.</strong>"

[lira_how_title]
other = "How it works"

[lira_step1_title]
other = "Connect your sources"

[lira_step1_text]
other = "LIRA integrates with your systems via native connectors (filesystem, cloud storage, database, FTP, SharePoint) and custom connectors for proprietary databases. It automatically monitors your sources: every new document and every change is detected and processed without manual intervention."

[lira_step2_title]
other = "Auto-index"

[lira_step2_text]
other = "Every added or modified document is indexed without manual operations. Semantic embeddings, keywords, images: everything on-premise, always up to date."

[lira_step3_title]
other = "Ask and receive"

[lira_step3_text]
other = "Ask a question in natural language. LIRA retrieves the relevant passages and generates an answer with precise source citation."

[lira_pillars_heading]
other = "Four pillars that make the difference"

[lira_architecture_title]
other = "Behind the scenes: the two-phase architecture"

[lira_architecture_lead]
other = "The product's core is a <abbr title=\"Retrieval-Augmented Generation\">RAG</abbr> system: given the user's question, it retrieves relevant passages from your documents and provides them to the LLM as context to generate an answer grounded in those passages — not in the model's memory."

[lira_ragu_title]
other = "RAG-U — the retrieval engine"

[lira_ragu_desc]
other = "RAG-U is the ingestion, indexing and retrieval pipeline that feeds the LLM with context extracted from your documents."

[lira_ragu_step1]
other = "<strong>Ingestion</strong> — reads your documents (.docx, PDF, mixed formats), extracts text, tables and images, splits into meaningful chunks."

[lira_ragu_step2]
other = "<strong>Indexing</strong> — transforms each chunk into semantic vectors + BM25 keyword index, inside an on-premise vector store."

[lira_ragu_step3]
other = "<strong>Retrieval</strong> — given the user's question, retrieves the most relevant passages by combining semantic and keyword search, reranks them, reconstructs section context."

[lira_ragu_step4]
other = "<strong>Image indexing</strong> — a parallel worker generates text captions for images and indexes them semantically alongside the text."

[lira_assistant_title]
other = "LIRA Assistant — the conversational interface"

[lira_assistant_desc]
other = "On top of RAG-U runs <strong>LIRA Assistant</strong>, the interface users actually interact with: a chat that responds in natural language, cites sources, and can be branded and integrated into your workflows."

[lira_assistant_feat1]
other = "OpenAI-compatible API → integrates with any tool or framework that already uses the OpenAI Chat Completions API"

[lira_assistant_feat2]
other = "MCP <abbr title=\"Model Context Protocol\">server</abbr> → exposes retrieval as a tool to MCP clients and external AI agents"

[lira_punchline]
other = "In summary: <strong>RAG-U retrieves the context, LIRA Assistant uses it to respond.</strong>"

