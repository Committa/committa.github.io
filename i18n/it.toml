[lira_made_for_you_title]
other = "Costruita sui tuoi documenti. Non su internet."

[lira_made_for_you_lead]
other = "Le IA generiche sono potenti ma hanno un limite strutturale: <em>non conoscono la tua azienda</em>. Non sanno cosa c'è nei tuoi contratti, nei tuoi manuali tecnici, nei protocolli che usi da vent'anni. Così generalizzano. Si inventano le risposte. Tu hai bisogno di fatti, non di fantasia."

[lira_made_for_you_body]
other = "LIRA non è una piattaforma preconfezionata da adattare a te. <strong>È il contrario</strong>: la piattaforma si modella su di te. I risultati sono <em>qualitativamente superiori</em> a qualunque soluzione out-of-the-box, per un motivo semplice: <strong>loro partono da internet, noi partiamo dai tuoi documenti.</strong>"

[lira_how_title]
other = "Come funziona"

[lira_step1_title]
other = "Connetti le tue fonti"

[lira_step1_text]
other = "LIRA si integra con i tuoi sistemi via connettori nativi (filesystem, cloud storage, database, FTP, SharePoint) e connettori custom per basi dati proprietarie. Monitora le tue fonti in automatico: ogni nuovo documento e ogni modifica vengono rilevati e processati senza intervento manuale."

[lira_step2_title]
other = "Indicizza in automatico"

[lira_step2_text]
other = "Ogni documento aggiunto o modificato viene indicizzato senza operazioni manuali. Embedding semantici, keyword, immagini: tutto on-premise, sempre aggiornato."

[lira_step3_title]
other = "Chiedi e ricevi"

[lira_step3_text]
other = "Fai una domanda in linguaggio naturale. LIRA recupera i passaggi rilevanti e genera una risposta con citazione puntuale della fonte."

[lira_pillars_heading]
other = "Quattro pilastri che fanno la differenza"

[lira_architecture_title]
other = "Dietro le quinte: l'architettura in due tempi"

[lira_architecture_lead]
other = "Il cuore del prodotto è un sistema <abbr title=\"Retrieval-Augmented Generation\">RAG</abbr>: alla domanda dell'utente, recupera i passaggi rilevanti dai tuoi documenti e li fornisce all'LLM come contesto per generare una risposta fondata su quei passaggi — non sulla memoria del modello."

[lira_ragu_title]
other = "RAG-U — il motore di retrieval"

[lira_ragu_desc]
other = "RAG-U è la pipeline di ingestion, indicizzazione e retrieval che alimenta l'LLM con il contesto estratto dai tuoi documenti."

[lira_ragu_step1]
other = "<strong>Ingestione</strong> — legge i tuoi documenti (.docx, PDF, formati misti), estrae testo, tabelle e immagini, divide in chunk significativi."

[lira_ragu_step2]
other = "<strong>Indicizzazione</strong> — trasforma ogni chunk in vettori semantici + indice BM25 per keyword, dentro un vector store on-prem."

[lira_ragu_step3]
other = "<strong>Retrieval</strong> — alla domanda dell'utente, recupera i passaggi più rilevanti combinando ricerca semantica e keyword, li reranka, ricostruisce il contesto di sezione."

[lira_ragu_step4]
other = "<strong>Indicizzazione immagini</strong> — un worker parallelo genera caption testuali per le immagini e le indicizza semanticamente insieme al testo."

[lira_assistant_title]
other = "LIRA Assistant — l'interfaccia conversazionale"

[lira_assistant_desc]
other = "Sopra RAG-U gira <strong>LIRA Assistant</strong>, l'interfaccia che gli utenti usano effettivamente: una chat che risponde in linguaggio naturale, cita le fonti, può essere brandizzata e integrata nei tuoi flussi."

[lira_assistant_feat1]
other = "API compatibile OpenAI → si integra con qualsiasi tool o framework che già usa l'API Chat Completions di OpenAI"

[lira_assistant_feat2]
other = "Server <abbr title=\"Model Context Protocol\">MCP</abbr> → espone la retrieval come strumento a client MCP e agenti IA esterni"

[lira_punchline]
other = "In sintesi: <strong>RAG-U recupera il contesto, LIRA Assistant lo usa per rispondere.</strong>"

