- title: "Sviluppo per automazione industriale e logistica"
  icon: cpu
  description: "Software per la gestione e l'ottimizzazione dei processi produttivi e logistici."
  list:
    - "**WMS** (Warehouse Management System) — gestione del magazzino: monitoraggio scorte, pianificazione spedizioni, ottimizzazione dello stoccaggio, integrazione con sistemi logistici."
    - "**MES** (Manufacturing Execution System) — monitoraggio e controllo delle operazioni produttive, tracciabilità e visibilità in tempo reale delle attività industriali."
    - "**HMI** (Human Machine Interface) — interfacce uomomacchina intuitive e personalizzate per il controllo e il monitoraggio degli impianti."
- title: "Integrazione e comunicazione tra sistemi"
  icon: plug
  description: "Soluzioni per l'interfacciamento di sistemi informatici e hardware, seguendo i principi dell'Industria 4.0."
  list:
    - "Integrazione tra sistemi ERP, WMS, MES e HMI."
    - "Connessioni a dispositivi industriali: PLC, robot, sensori IoT."
    - "Automazione dei flussi di dati per sincronizzare e velocizzare i processi."
- title: "Assistenza tecnica e manutenzione"
  icon: life-buoy
  description: "Supporto post-implementazione per garantire il funzionamento ottimale dei software nel tempo."
  list:
    - "Supporto post-implementazione per garantire il funzionamento ottimale."
    - "Diagnosi e risoluzione di problemi tecnici, anche da remoto."
    - "Aggiornamenti e miglioramenti per adeguare i software a nuove esigenze operative."
- title: "Consulenza tecnica e formazione"
  icon: graduation-cap
  description: "Analisi dei processi, consulenza sull'Industria 4.0 e formazione del personale."
  list:
    - "Analisi dei processi aziendali per identificare soluzioni su misura."
    - "Consulenza per l'adozione di tecnologie avanzate nell'Industria 4.0."
    - "Formazione del personale sull'uso e la gestione delle applicazioni sviluppate."