- scenario: "The packaging line is down: which Modbus registers should I read to check if the fault is on belt 3?"
  generica: "Explains in theory how Modbus works"
  lira: "Read register 40120 (belt 3 status): if bit 2=0 the motor is in fault. PLC manual LC3 rev.7, § 4.3"
- scenario: "The supplier delivered 18 days late. How much is the penalty?"
  generica: "Quotes the Civil Code, not your contract"
  lira: "1.5% per day beyond 10 days = 12% of the amount. Art. 8.2, supply contract 03/15/2025"
- scenario: "Which PPE is required to access the mixing department according to our DVR?"
  generica: "Lists generic PPE required by law"
  lira: "Helmet, cut-resistant gloves, S3 footwear and self-contained breathing apparatus for ATEX zone 2. DVR rev.12, p. 47"
- scenario: "Find the CT scan of patient 4821 and the related report from June 12, 2024"
  generica: "Cannot access your medical archives"
  lira: "2 images + report: 'Upper abdomen CT — pat. 4821' dated 06/12/2024, signed by the radiologist. From the corporate RIS system"
