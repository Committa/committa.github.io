heading: "Soluzioni di intelligenza artificiale"
lead: "Dalla consulenza allo sviluppo: aiutiamo le aziende ad adottare l'intelligenza artificiale per automatizzare processi, estrarre valore dai dati e prendere decisioni più rapide. On-premise, senza cedere dati a terzi."
cards:
  - title: "Agenti AI per l'automazione dei processi"
    icon: sparkles
    description: "Progettiamo e sviluppiamo agenti basati su LLM che automatizzano workflow complessi: dall'elaborazione documentale alla gestione delle non conformità, fino al supporto decisionale in produzione."
    list:
      - "Analisi dei processi e identificazione delle opportunità di automazione con AI"
      - "Sviluppo di agenti LLM integrati con i tuoi sistemi (ERP, WMS, MES)"
      - "Agenti con tool use: l'AI non risponde e basta, esegue azioni sui tuoi dati"
      - "Deployment on-premise, senza inviare dati a servizi cloud di terze parti"
  - title: "LIRA — la tua AI sul tuo patrimonio documentale"
    icon: cpu
    description: "Il nostro prodotto RAG on-premise: risposte precise costruite sui tuoi documenti, non su internet. Perfetto per manuali tecnici, contratti, procedure e archivi normativi."
    list:
      - "Risposte verificabili con citazione puntuale della fonte"
      - "Indicizzazione di PDF, docx, immagini e documenti tecnici"
      - "Tutto on-premise, nessun dato inviato all'esterno"
      - "API compatibile OpenAI e server MCP per integrarlo nei tuoi tool"
    link: "/lira/"