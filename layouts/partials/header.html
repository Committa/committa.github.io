{{- $logoInverted := .Site.Params.logo_inverted | default "images/InvertedLogo.svg" -}}
<header class="site-header" id="site-header">
  <div class="topbar">
    <div class="container topbar__inner">
      <span class="topbar__text">Soluzioni software &amp; IA per l'Industria 4.0</span>
    </div>
  </div>
  <div class="nav" aria-label="Navigazione principale">
    <div class="container nav__inner">
      <a href="{{ "/" | relURL }}" class="brand" aria-label="Committa — home">
        <img src="{{ $logoInverted | relURL }}" alt="Committa" class="brand__logo">
      </a>
      <nav class="nav__menu" id="nav-menu" aria-label="Menu principale">
        {{- range .Site.Menus.main -}}
        <a href="{{ .URL | relURL }}" class="nav__link{{ if $.IsMenuCurrent "main" . }} nav__link--active{{ end }}">{{ .Name }}</a>
        {{- end -}}
      </nav>
      <a href="{{ "/contatti/" | relURL }}" class="btn btn--primary nav__cta">Contattaci</a>
      <button class="nav__toggle" type="button" aria-label="Apri menu" aria-expanded="false" aria-controls="nav-drawer" data-nav-toggle>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="M3 6h18M3 12h18M3 18h18"></path>
        </svg>
      </button>
    </div>
  </div>
  <div class="nav-drawer" id="nav-drawer" data-nav-drawer hidden>
    <nav aria-label="Menu mobile">
      {{- range .Site.Menus.main -}}
      <a href="{{ .URL | relURL }}" class="nav-drawer__link">{{ .Name }}</a>
      {{- end -}}
      <a href="{{ "/contatti/" | relURL }}" class="btn btn--primary btn--block nav-drawer__cta">Contattaci</a>
    </nav>
    <button class="nav-drawer__backdrop" type="button" aria-label="Chiudi menu" data-nav-close tabindex="-1"></button>
  </div>
</header>
